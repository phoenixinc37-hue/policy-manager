<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VET INC Title Page Template</title>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      position: relative;
      background: #fff;
      box-sizing: border-box;
    }

    .title-wrap {
      position: absolute;
      top: 140mm;
      left: 0;
      width: 100%;
      text-align: center;
      color: #111;
    }

    .title {
      font-size: 27px;
      line-height: 1.2;
      font-weight: 400;
      margin: 0 0 12px 0;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 155mm;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 400;
      color: #333;
    }

    .hint {
      position: absolute;
      left: 16mm;
      bottom: 12mm;
      font-size: 10px;
      color: #999;
    }

    @media print {
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title-wrap">
      <div class="title" contenteditable="true">Core Thinking Notes</div>
      <div class="subtitle" contenteditable="true">
        Pricing discipline framework for sustainable revenue capture and margin protection.
      </div>
    </div>

    <div class="hint">
      Editable template. Open in Word or browser, then edit title/subtitle text.
    </div>
  </div>
</body>
</html>
