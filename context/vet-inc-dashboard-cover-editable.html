<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vet INC Dashboard Cover Editable</title>
  <style>
    @page { size: A4; margin: 0; }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #2f3a4a;
    }
    .page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      position: relative;
      background: #fff;
      box-sizing: border-box;
    }
    .stack {
      position: absolute;
      top: 76mm;
      left: 50%;
      transform: translateX(-50%);
      width: 112mm;
      text-align: center;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20mm;
    }
    .logo-svg {
      width: 25px;
      height: 30px;
      display: block;
      flex: 0 0 auto;
    }
    .brand-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #2f4f7f;
      line-height: 1;
    }
    .kicker {
      font-size: 8.5px;
      letter-spacing: 3.4px;
      color: #727d8c;
      margin-bottom: 9px;
      font-weight: 700;
    }
    .divider {
      width: 36px;
      height: 2px;
      background: #7c8693;
      margin: 0 auto 18px auto;
      border-radius: 1px;
    }
    .title {
      font-size: 31px;
      font-weight: 700;
      line-height: 1.15;
      color: #313b4b;
      margin: 0 0 8px 0;
    }
    .subtitle {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      color: #4b5563;
      margin: 0 0 22mm 0;
    }
    .desc {
      width: 92mm;
      margin: 0 auto 18mm auto;
      font-size: 10.5px;
      line-height: 1.65;
      color: #717b88;
    }
    .footer {
      width: 68mm;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #8a93a0;
    }
    [contenteditable="true"]:focus {
      outline: 1px dashed #9bb7d3;
      outline-offset: 3px;
    }
    @media print {
      [contenteditable="true"]:focus { outline: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="stack">
      <div class="brand">
        <svg class="logo-svg" viewBox="0 0 64 78" aria-hidden="true">
          <defs>
            <linearGradient id="shieldGradient2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#4a90d6" />
              <stop offset="100%" stop-color="#234e88" />
            </linearGradient>
          </defs>
          <path d="M32 2 L56 12 Q60 13 60 18 L60 42 Q60 46 57 49 L32 76 L7 49 Q4 46 4 42 L4 18 Q4 13 8 12 Z" fill="url(#shieldGradient2)"/>
          <path d="M16 24 C17 19, 21 15, 26 14 C25 18, 26 22, 29 26 C31 29, 33 31, 35 34 C31 34, 28 34, 25 36 C22 38, 19 42, 18 47 C14 42, 12 36, 13 30 C13 28, 14 26, 16 24 Z" fill="#ffffff"/>
          <path d="M25 39 C27 36, 31 34, 35 34 C40 34, 44 37, 46 42 C42 41, 39 42, 36 44 C34 46, 32 49, 31 53 C28 51, 25 48, 24 44 C24 42, 24 40, 25 39 Z" fill="#ffffff"/>
          <rect x="45.5" y="12" width="4.5" height="13" rx="1" fill="#ffffff"/>
          <rect x="41.25" y="16.25" width="13" height="4.5" rx="1" fill="#ffffff"/>
        </svg>
        <div class="brand-text" contenteditable="true">VET INC.</div>
      </div>

      <div class="kicker" contenteditable="true">FEATURE GUIDE</div>
      <div class="divider"></div>
      <div class="title" contenteditable="true">Dashboard v1.3</div>
      <div class="subtitle" contenteditable="true">Complete Platform Directory</div>
      <div class="desc" contenteditable="true">A visual walkthrough of every feature in the Vet INC Business Dashboard. From real-time revenue tracking to AI-powered pricing recommendations.</div>
      <div class="footer">
        <span contenteditable="true">April 2026</span>
        <span contenteditable="true">Vet INC</span>
      </div>
    </div>
  </div>
</body>
</html>
